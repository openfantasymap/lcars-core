# Publish @openfantasymap/lcars-core to npm (public) on a version tag.
#
#   git tag v0.2.0 && git push origin v0.2.0   →   publishes 0.2.0
#
# Requires repo secret NPM_TOKEN (an npm automation token with publish rights).
# Provenance needs a PUBLIC repo + id-token: write (drop --provenance if private).
name: Publish lcars-core

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dist-tag:
        description: npm dist-tag
        default: latest

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-lcars-core-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - name: Build (Stylus → dist CSS)
        run: npm run build

      - name: CSS sanity (no leaked Stylus vars / broken calc)
        run: |
          node -e "const c=require('fs').readFileSync('dist/lcars.expanded.css','utf8'); if(/\\\$lcars|\"calc|undefined/.test(c)){console.error('CSS leak detected');process.exit(1)} console.log('css ok')"

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          echo "package=$PKG tag=$TAG"
          [ "$PKG" = "$TAG" ] || { echo "::error::tag v$TAG does not match package.json $PKG"; exit 1; }

      - name: Publish to npm
        run: npm publish --provenance --access public --tag "${{ github.event.inputs.dist-tag || 'latest' }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
